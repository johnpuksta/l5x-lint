name: Update Homebrew formula

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
    secrets:
      HOMEBREW_TAP_TOKEN:
        required: true

jobs:
  homebrew:
    name: Update tap formula
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute SHA256 of source tarball
        id: sha
        run: |
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/v${{ inputs.version }}.tar.gz"
          echo "url=${URL}" >> $GITHUB_OUTPUT
          SHA=$(curl -sL "${URL}" | sha256sum | cut -d' ' -f1)
          echo "sha256=${SHA}" >> $GITHUB_OUTPUT

      - name: Checkout homebrew tap repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          URL="${{ steps.sha.outputs.url }}"
          SHA256="${{ steps.sha.outputs.sha256 }}"
          FORMULA="homebrew-tap/Formula/l5x-lint.rb"

          mkdir -p "$(dirname "${FORMULA}")"
          cat > "${FORMULA}" << FORMULA
          class L5xLint < Formula
            desc "Semantic linter for Rockwell Logix L5X PLC programs"
            homepage "https://github.com/${{ github.repository }}"
            url "${URL}"
            sha256 "${SHA256}"
            license "MIT"

            depends_on "python@3.12"

            def install
              system "pipx", "install", "--spec", "l5x-lint==#{version}", "l5x-lint"
            end

            test do
              system "#{bin}/l5x-lint", "--help"
            end
          end
          FORMULA

          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "Formula/l5x-lint.rb"
          git commit -m "l5x-lint: update to ${{ inputs.version }}"
          git push
