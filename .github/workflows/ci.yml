name: CI

on:
  push:
  workflow_call:

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Check formatting
        run: uv run ruff format --check .
        shell: bash

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Run linter
        run: uv run ruff check .
        shell: bash

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Run unit tests
        env:
          PYTHONPATH: src
        run: uv run pytest tests/unit -v
        shell: bash

  benchmark-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Run benchmark tests
        env:
          PYTHONPATH: src
        run: uv run pytest tests/benchmarks -v -m benchmark
        shell: bash
