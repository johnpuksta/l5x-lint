name: Push Chocolatey package

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
    secrets:
      CHOCOLATEY_API_KEY:
        required: true

jobs:
  chocolatey:
    name: Pack and push
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows executable
        uses: actions/download-artifact@v4
        with:
          name: l5x-lint-windows-x86_64.exe
          path: installers/choco/tools

      - name: Compute checksum
        id: checksum
        shell: pwsh
        run: |
          $hash = Get-FileHash -Path "installers/choco/tools/l5x-lint-windows-x86_64.exe" -Algorithm SHA256
          $sha = $hash.Hash.ToLower()
          echo "sha256=$sha" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Stamp version and checksum
        shell: pwsh
        run: |
          $VERSION = "${{ inputs.version }}"
          $SHA256 = "${{ steps.checksum.outputs.sha256 }}"

          $content = Get-Content "installers/choco/tools/chocolateyInstall.ps1" -Raw
          $content = $content -replace '\$version = ".*"', "`$version = `"${VERSION}`""
          $content = $content -replace '\$checksum = ".*"', "`$checksum = `"${SHA256}`""
          Set-Content -Path "installers/choco/tools/chocolateyInstall.ps1" -Value $content -Encoding utf8

          $nuspec = Get-Content "installers/choco/l5x-lint.nuspec" -Raw
          $nuspec = $nuspec -replace '<version>.*</version>', "<version>${VERSION}</version>"
          Set-Content -Path "installers/choco/l5x-lint.nuspec" -Value $nuspec -Encoding utf8

      - name: Pack and push
        shell: pwsh
        run: |
          cd installers/choco
          choco pack
          $nupkg = Get-ChildItem -Filter "*.nupkg" | Select-Object -First 1
          choco push $nupkg.Name --source https://push.chocolatey.org/ --api-key ${{ secrets.CHOCOLATEY_API_KEY }}
