[project]
name = "l5x-lint"
version = "0.1.0"
description = "Semantic analyzer / linter for Rockwell L5X PLC programs"
requires-python = ">=3.12"
dependencies = [
    "lark>=1.1",
    "l5x>=0.1",
    "returns>=0.27",
]

[tool.setuptools.packages.find]
where = ["src"]
exclude = ["references*"]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.9",
]
mcp = ["mcp>=1.0"]
xsd = ["xmlschema>=3.0"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]

[tool.ruff.format]
line-ending = "auto"

[tool.uv]

[tool.pytest.ini_options]
testpaths = ["tests"]
