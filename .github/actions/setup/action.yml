name: Setup
description: Install uv, Python, and sync dependencies

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v8.1.0
      with:
        enable-cache: true
        cache-dependency-glob: uv.lock

    - name: Set up Python
      run: uv python install 3.12
      shell: bash

    - name: Install dependencies
      run: uv sync --locked --all-extras --dev
      shell: bash
